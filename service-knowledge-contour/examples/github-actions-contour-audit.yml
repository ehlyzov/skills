name: contour-audit

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  contour-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: chmod +x bin/*.sh
      - run: ./bin/refresh_contour.sh
      - run: ./bin/audit_contour.sh
